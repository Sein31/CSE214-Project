spring.application.name=aad

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/aad_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── JWT (AV-06: Guclu secret key — min 64 karakter) ──────────────────────────
jwt.secret=X9#mK2$pL8@nQ5&vR3!wZ7*yA4^cE6+bF1-gH0=jN9%uT2@sD4&hM7!xP3^qW6
jwt.expiration-ms=86400000

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── AI Chatbot ────────────────────────────────────────────────────────────────
ai.chatbot.url=http://localhost:8000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example=INFO
logging.level.org.springframework.security=WARN
stripe.secret-key=sk_test_... (YOUR_KEY_HERE)
stripe.publishable-key=pk_test_... (YOUR_KEY_HERE)
spring.security.debug=true