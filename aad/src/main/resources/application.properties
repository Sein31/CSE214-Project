spring.application.name=aad

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/aad_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── JWT (AV-06: Guclu secret key — min 64 karakter) ──────────────────────────
jwt.secret=${JWT_SECRET:X9#mK2$pL8@nQ5&vR3!wZ7*yA4^cE6+bF1-gH0=jN9%uT2@sD4&hM7!xP3^qW6}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── AI Chatbot ────────────────────────────────────────────────────────────────
ai.chatbot.url=${AI_CHATBOT_URL:http://localhost:8000}
ai.chatbot.api-key=${AI_CHATBOT_API_KEY:dev-internal-token-change-me}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example=INFO
logging.level.org.springframework.security=WARN
stripe.secret-key=${STRIPE_SECRET_KEY:***}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:***}
spring.security.debug=false